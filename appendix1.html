<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appendix 1 — [Document Title]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── Tokens ─────────────────────────────────── */
    :root {
      --bg:          #f7f5f0;
      --surface:     #ffffff;
      --border:      #e2ddd6;
      --accent:      #2a2420;
      --muted:       #8c857c;
      --caption-bg:  #f0ede7;

      --font-display: "DM Serif Display", Georgia, serif;
      --font-body:    "DM Sans", system-ui, sans-serif;

      --max-w:   1100px;
      --gap:     2rem;
      --radius:  6px;
    }

    /* ─── Reset ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Page ───────────────────────────────────── */
    body {
      background: var(--bg);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────────── */
    .page-header {
      border-bottom: 2px solid var(--accent);
      padding: 3rem 2rem 2rem;
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .appendix-label {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.15;
      font-weight: 400;
    }

    .page-subtitle {
      margin-top: 0.75rem;
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 55ch;
    }

    /* ─── Main content ───────────────────────────── */
    main {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }

    /* ─── Section ────────────────────────────────── */
    .section {
      margin-bottom: 3.5rem;
    }

    .section-heading {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 400;
      margin-bottom: 1.25rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .section-heading .section-num {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ─── Image grid ─────────────────────────────── */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: var(--gap);
    }

    /* Span helpers — add class="span-2" or "span-3" to a figure */
    @media (min-width: 640px) {
      .image-grid .span-2 { grid-column: span 2; }
      .image-grid .span-3 { grid-column: 1 / -1; }
    }

    /* ─── Figure ─────────────────────────────────── */
    figure {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    figure:hover {
      box-shadow: 0 8px 24px rgba(42,36,32,.10);
      transform: translateY(-2px);
    }

    .figure-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;       /* change to suit your images */
      background: var(--caption-bg);
      overflow: hidden;
    }

    /* Tall variant */
    figure.tall .figure-img-wrap { aspect-ratio: 3 / 4; }

    /* Wide variant (pairs with span-2 / span-3) */
    figure.wide .figure-img-wrap { aspect-ratio: 16 / 7; }

    .figure-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Placeholder shown when no real image is supplied */
    .figure-img-wrap .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      height: 100%;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      user-select: none;
    }

    .figure-img-wrap .placeholder svg {
      opacity: 0.35;
    }

    figcaption {
      background: var(--caption-bg);
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
    }

    .caption-title {
      font-weight: 500;
      font-size: 0.875rem;
      color: var(--accent);
      margin-bottom: 0.2rem;
    }

    .caption-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ─── Footer ─────────────────────────────────── */
    .page-footer {
      border-top: 1px solid var(--border);
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ─── Responsive tweaks ──────────────────────── */
    @media (max-width: 500px) {
      .page-header { padding: 2rem 1.25rem 1.5rem; }
      main { padding: 2rem 1.25rem 3rem; }
      .page-footer { flex-direction: column; gap: 0.4rem; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════ HEADER ══════════════════════ -->
  <header class="page-header">
    <p class="appendix-label">Appendix 1</p>
    <h1 class="page-title">Appendix Title Goes Here</h1>
    <p class="page-subtitle">
      A brief description of what this appendix contains and why it is included.
      Replace this text with your own summary.
    </p>
  </header>

  <!-- ══════════════════════ MAIN ════════════════════════ -->
  <main>

    <!-- ── Section A ─────────────────────────────────── -->
    <section class="section">
      <h2 class="section-heading">
        <span class="section-num">A</span>
        Section Title
      </h2>

      <div class="image-grid">

        <!-- Figure 1 -->
        <figure>
          <div class="figure-img-wrap">
            <!-- Replace the placeholder div with: <img src="your-image.jpg" alt="Description"> -->
            <div class="placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              Image placeholder
            </div>
          </div>
          <figcaption>
            <p class="caption-title">Figure 1.1 — Caption Title</p>
            <p class="caption-desc">Describe what this image shows, its source, or any relevant notes.</p>
          </figcaption>
        </figure>

        <!-- Figure 2 -->
        <figure>
          <div class="figure-img-wrap">
            <div class="placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              Image placeholder
            </div>
          </div>
          <figcaption>
            <p class="caption-title">Figure 1.2 — Caption Title</p>
            <p class="caption-desc">Describe what this image shows, its source, or any relevant notes.</p>
          </figcaption>
        </figure>

        <!-- Figure 3 -->
        <figure>
          <div class="figure-img-wrap">
            <div class="placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              Image placeholder
            </div>
          </div>
          <figcaption>
            <p class="caption-title">Figure 1.3 — Caption Title</p>
            <p class="caption-desc">Describe what this image shows, its source, or any relevant notes.</p>
          </figcaption>
        </figure>

      </div><!-- /image-grid -->
    </section>

    <!-- ── Section B ─────────────────────────────────── -->
    <section class="section">
      <h2 class="section-heading">
        <span class="section-num">B</span>
        Another Section Title
      </h2>

      <div class="image-grid">

        <!-- Wide figure spanning 2 columns -->
        <figure class="wide span-2">
          <div class="figure-img-wrap">
            <div class="placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              Wide image placeholder
            </div>
          </div>
          <figcaption>
            <p class="caption-title">Figure 2.1 — Wide Caption Title</p>
            <p class="caption-desc">Use the <code>span-2</code> class on the figure to make it span two columns. Great for panoramas or comparison images.</p>
          </figcaption>
        </figure>

        <!-- Normal figure -->
        <figure>
          <div class="figure-img-wrap">
            <div class="placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              Image placeholder
            </div>
          </div>
          <figcaption>
            <p class="caption-title">Figure 2.2 — Caption Title</p>
            <p class="caption-desc">Describe what this image shows, its source, or any relevant notes.</p>
          </figcaption>
        </figure>

        <!-- Tall figure -->
        <figure class="tall">
          <div class="figure-img-wrap">
            <div class="placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              Tall image placeholder
            </div>
          </div>
          <figcaption>
            <p class="caption-title">Figure 2.3 — Tall Caption Title</p>
            <p class="caption-desc">Use the <code>tall</code> class on the figure for portrait-oriented images.</p>
          </figcaption>
        </figure>

      </div><!-- /image-grid -->
    </section>

  </main>

  <!-- ══════════════════════ FOOTER ══════════════════════ -->
  <footer class="page-footer">
    <span>Document Title — Appendix 1</span>
    <span>Page 1</span>
  </footer>

</body>
</html>
